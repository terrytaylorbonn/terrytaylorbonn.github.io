# DocSearch configuration
# You'll need to apply for DocSearch at https://docsearch.algolia.com/apply/
# or set up your own Algolia index

app_id: "YOUR_APP_ID"
api_key: "YOUR_SEARCH_API_KEY"
index_name: "ziptieai"
debug: false

# Search parameters
search_parameters:
  hitsPerPage: 20
  facetFilters: []

# UI customization
placeholder: "Search ZiptieAI..."
max_results_per_group: 5

# Translations
translations:
  button:
    buttonText: "Search"
    buttonAriaLabel: "Search"
  modal:
    searchBox:
      resetButtonTitle: "Clear the query"
      resetButtonAriaLabel: "Clear the query"
      cancelButtonText: "Cancel"
      cancelButtonAriaLabel: "Cancel"
    footer:
      selectText: "to select"
      navigateText: "to navigate"
      closeText: "to close"
      searchByText: "Search by"
