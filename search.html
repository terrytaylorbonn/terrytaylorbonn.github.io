<div id="search-container">
  <input type="text" id="search-input" placeholder="Search ZiptieAI..." autocomplete="off">
  <div id="search-results"></div>
</div>

<script>
// Simple client-side search for fallback
window.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  
  // Get URL parameter for search query
  const urlParams = new URLSearchParams(window.location.search);
  const query = urlParams.get('q');
  
  if (query) {
    searchInput.value = query;
    performSearch(query);
  }
  
  searchInput.addEventListener('input', function() {
    const query = this.value.trim();
    if (query.length > 2) {
      performSearch(query);
    } else {
      searchResults.innerHTML = '';
    }
  });
  
  function performSearch(query) {
    // This is a simple search implementation
    // You would replace this with your actual search logic
    searchResults.innerHTML = `
      <div class="search-info">
        <p>Searching for: <strong>${query}</strong></p>
        <p><em>Note: This is a fallback search. For full search functionality, configure DocSearch with your Algolia credentials.</em></p>
      </div>
      <div class="search-suggestions">
        <h3>Suggestions:</h3>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home - ZiptieAI Projects</a></li>
          <li><a href="{{ '/sandbox' | relative_url }}">AI/Tech Stack Sandbox</a></li>
          <li><a href="{{ '/aidrones' | relative_url }}">AI Drones Project</a></li>
          <li><a href="{{ '/about' | relative_url }}">About</a></li>
        </ul>
      </div>
    `;
  }
});
</script>
